name: Weekly Beauty Report — Atomic Deploy

on:
  schedule:
    # Every Monday 09:00 UTC+8 (01:00 UTC)
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      target_week:
        description: "ISO week to generate (e.g. 2026-W30). Leave empty for auto-resolve."
        required: false
        type: string
      skip_collect:
        description: "Skip data collection (use existing raw_collected.json)"
        required: false
        type: boolean
        default: false
      intentional_failure:
        description: "Force workflow to fail before deploy (Req 6 — deterministic failure test)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install requests

      - name: Compute target week
        id: iso_week
        env:
          TARGET_WEEK: ${{ inputs.target_week }}
          SCHEDULE_EVENT: ${{ github.event_name == 'schedule' }}
        run: |
          WEEK="${TARGET_WEEK}"
          if [ -z "$WEEK" ]; then
            WEEK=$(python3 -c "from beauty_weekly.week import resolve_week; print(resolve_week())")
          fi
          if [ ! "$WEEK" =~ ^[0-9]{4}-W[0-9]{2}$ ]; then
            echo "FATAL: invalid ISO week: $WEEK" >&2; exit 1
          fi
          {
            echo "week=$WEEK"
            echo "BEAUTY_WEEKLY_WEEK=$WEEK"
          } >> "$GITHUB_OUTPUT"
          echo "ISO week resolved: $WEEK"

      - name: Stage 1 — Collect raw data
        if: ${{ !inputs.skip_collect }}
        run: |
          echo "=== STAGE 1: Data Collection ==="
          python3 build/collect.py

      - name: Stage 1 — Verify collection
        run: |
          WEEK=${{ steps.iso_week.outputs.week }}
          if [ ! -f "data/weeks/$WEEK/raw_collected.json" ]; then
            echo "FATAL: raw_collected.json not found for $WEEK"; exit 1
          fi
          echo "OK raw_collected.json exists for $WEEK"

      - name: Gate — Intentional failure check
        if: ${{ inputs.intentional_failure }}
        run: |
          echo "FATAL: intentional_failure is set — aborting before deploy"
          exit 1

      - name: Stage 2 — Generate canonical content
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          echo "=== STAGE 2: Content Generation ==="
          if [ -z "$LLM_API_KEY" ]; then
            echo "FATAL: LLM_API_KEY secret not set"; exit 1
          fi
          python3 build/generate_weekly.py

      - name: Stage 2 — Verify canonical files
        run: |
          WEEK=${{ steps.iso_week.outputs.week }}
          for f in report.json sources.json scoring.json manifest.json; do
            if [ ! -f "data/weeks/$WEEK/$f" ]; then
              echo "FATAL: Missing $f for $WEEK"; exit 1
            fi
            echo "OK $f exists"
          done

      - name: Stage 3 — Validate and render
        env:
          BEAUTY_WEEKLY_WEEK: ${{ steps.iso_week.outputs.week }}
          BEAUTY_WEEKLY_REQUIRE_CURRENT: "1"
        run: |
          echo "=== STAGE 3: Validation & Rendering ==="
          ./build/weekly_update.sh

      - name: Stage 3 — Verify HTML output
        run: |
          for f in index.html index-cn.html fragrance.html fragrance-cn.html; do
            if [ ! -f "$f" ]; then echo "FATAL: $f not rendered"; exit 1; fi
            SIZE=$(wc -c < "$f")
            echo "OK $f ($SIZE bytes)"
          done

      - name: Generate artifact manifest
        id: manifest
        env:
          WEEK: ${{ steps.iso_week.outputs.week }}
        run: |
          echo "=== Generating artifact manifest for $WEEK ==="
          python3 -c "
          import hashlib, json, os, sys
          week = os.environ['WEEK']
          files = ['index.html', 'index-cn.html', 'fragrance.html', 'fragrance-cn.html']
          manifest = {'week': week, 'artifacts': {}}
          for fn in files:
              if not os.path.isfile(fn):
                  print(f'FATAL: {fn} not found', file=sys.stderr); sys.exit(1)
              with open(fn, 'rb') as f:
                  h = hashlib.sha256(f.read()).hexdigest()
              manifest['artifacts'][fn] = {'sha256': h, 'size': os.path.getsize(fn)}
              print(f'  {fn}: sha256={h}')
          with open('deploy-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print('Manifest written to deploy-manifest.json')
          "

      - name: Stage 4 — Atomic commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== STAGE 4: Atomic Commit & Push ==="
          WEEK=${{ steps.iso_week.outputs.week }}
          WEEK_NUM=$((10#${WEEK#*-W}))

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            "index.html" "index-cn.html" "fragrance.html" "fragrance-cn.html" \
            "data/weeks/$WEEK/" "archive/week-$WEEK_NUM/" "deploy-manifest.json" \
            2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"; exit 0
          fi

          git commit -m "Weekly auto-update: $WEEK"

          git fetch origin main
          git rebase origin/main || { echo "Rebase conflict — aborting"; git rebase --abort; exit 1; }

          REMOTE_URL=$(git remote get-url origin)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
          git remote set-url origin "$REMOTE_URL"
          echo "Pushed commit $(git rev-parse HEAD)"

      - name: Stage 5 — Wait for GitHub Pages build
        id: pages_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== STAGE 5: Waiting for GitHub Pages build ==="
          python3 -c "
          import json, sys, time, urllib.request, urllib.error

          token = __import__('os').environ['GITHUB_TOKEN']
          repo = '${{ github.repository }}'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'beauty-weekly-deploy',
          }
          TIMEOUT = 600
          POLL = 15
          start = time.time()

          while time.time() - start < TIMEOUT:
              url = f'https://api.github.com/repos/{repo}/pages/builds/latest'
              req = urllib.request.Request(url, headers=headers)
              try:
                  resp = urllib.request.urlopen(req, timeout=15)
                  data = json.loads(resp.read())
                  status = data.get('status', '')
                  print(f'  Build status: {status}')
                  if status in ('built', 'ready'):
                      print(f'  Pages build complete ({int(time.time()-start)}s)')
                      sys.exit(0)
                  if status == 'failed':
                      print(f'  Pages build FAILED'); sys.exit(1)
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print(f'  No build yet (404), waiting...')
                  else:
                      print(f'  HTTP {e.code}, retrying...')
              except Exception as e:
                  print(f'  Error: {e}, retrying...')
              time.sleep(POLL)

          print(f'  Timed out after {TIMEOUT}s'); sys.exit(1)
          "

      - name: Stage 6 — Verify live deployment
        run: |
          echo "=== STAGE 6: Live Verification ==="
          python3 -c "
          import hashlib, json, os, re, sys, time, urllib.request

          WEEK = '${{ steps.iso_week.outputs.week }}'
          REPO = '${{ github.repository }}'
          PAGES = {
              'index.html': f'https://raw.githubusercontent.com/{REPO}/main/index.html',
              'index-cn.html': f'https://raw.githubusercontent.com/{REPO}/main/index-cn.html',
              'fragrance.html': f'https://raw.githubusercontent.com/{REPO}/main/fragrance.html',
              'fragrance-cn.html': f'https://raw.githubusercontent.com/{REPO}/main/fragrance-cn.html',
          }
          CDN = {
              'index.html': 'https://edeleneguo.github.io/beauty-weekly/',
              'index-cn.html': 'https://edeleneguo.github.io/beauty-weekly/index-cn.html',
              'fragrance.html': 'https://edeleneguo.github.io/beauty-weekly/fragrance.html',
              'fragrance-cn.html': 'https://edeleneguo.github.io/beauty-weekly/fragrance-cn.html',
          }

          manifest = {}
          if os.path.isfile('deploy-manifest.json'):
              with open('deploy-manifest.json') as f:
                  manifest = json.load(f)

          expected_num = WEEK.split('-W')[-1] if '-W' in WEEK else '?'
          all_ok = True

          for name in PAGES:
              for label, url in [('raw', PAGES[name]), ('cdn', CDN[name])]:
                  endpoint_ok = False
                  attempts = 12 if label == 'cdn' else 1
                  for attempt in range(1, attempts + 1):
                      try:
                          req = urllib.request.Request(
                              url + '?v=' + str(time.time()),
                              headers={'User-Agent': 'beauty-weekly-verify'},
                          )
                          html = urllib.request.urlopen(req, timeout=15).read()
                          text = html.decode('utf-8', errors='replace')
                          m = re.search(r'Week\s+(\d+)', text)
                          week_num = m.group(1) if m else '?'
                          remote_hash = hashlib.sha256(html).hexdigest()
                          manifest_hash = manifest.get('artifacts', {}).get(name, {}).get('sha256', '')
                          endpoint_ok = week_num == expected_num and remote_hash == manifest_hash
                          status = 'LIVE' if endpoint_ok else f'WAIT {attempt}/{attempts}'
                          print(f'  {name} ({label}): Week {week_num} (expect {expected_num}) sha256={remote_hash[:16]}... {status}')
                          if endpoint_ok:
                              break
                      except Exception as e:
                          print(f'  {name} ({label}) attempt {attempt}: ERROR: {e}')
                      if attempt < attempts:
                          time.sleep(15)
                  if not endpoint_ok:
                      all_ok = False

          print()
          sys.exit(0 if all_ok else 1)
          "
