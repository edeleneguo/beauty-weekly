name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Secret scanner
        run: python build/check_secrets.py

      - name: Ruff lint
        run: ruff check .

      - name: Full fail-closed quality gate
        run: ./build/check.sh
