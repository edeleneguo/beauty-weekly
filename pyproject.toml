[tool.ruff]
target-version = "py39"
line-length = 100
src = ["build", "tests", "beauty_weekly"]
exclude = ["*.sh"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"build/extract_data.py" = ["UP", "I", "E501", "B"]
"build/render.py" = ["UP", "I", "E501", "B"]
"build/validate.py" = ["UP", "I", "E501", "B", "SIM"]
"build/generate_monthly.py" = ["UP", "I", "E501", "B"]
"build/fix_week28_data.py" = ["UP", "I", "E501", "B", "SIM"]
"tests/test_week28.py" = ["UP", "I", "E501", "B"]
"tests/test_secrets.py" = ["E402"]
"tests/test_verify_deploy.py" = ["E731"]
"beauty_weekly/__init__.py" = ["F401"]
"build/validate_schema.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
